<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Warm · Shampoo Shopping Assistant</title>
<link rel="preload" as="image" href="./g150-daily.png">
<style>
  :root{
    --apricot:#ffcba4; --apricot-200:#ffe1cc; --apricot-300:#ffd8b6;
    --blue-50:#eef7ff; --blue-200:#d2e7ff; --text:#18324b; --muted:#5a372a;
    --lavender-light:#eac9f3;
    --w:420px; --radius:22px; 
    --shadow:0 10px 28px rgba(24,50,75,.08);
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; display:flex; justify-content:center; align-items:center;
    background:linear-gradient(180deg, var(--apricot-200), var(--blue-50));
    font-family:Inter,Segoe UI,system-ui,Arial; color:var(--text);
  }
  .phone{
    width:var(--w); height:760px; border-radius:28px; overflow:hidden;
    background:#fff; box-shadow:var(--shadow); border:10px solid #2c394a;
  }
  .header{
    height:72px; display:flex; align-items:center; gap:10px; padding:0 16px; color:#fff;
    background:linear-gradient(135deg,#ffbb8e,#7ab8ff)
  }
  .header .dot{width:10px;height:10px;border-radius:50%;background:#fff3}
  .title{font-weight:700}
  .chat{height:calc(100% - 72px); overflow-y:auto; padding:16px; background:linear-gradient(180deg,#f7fbff,#fff)}
  .row{display:flex; margin:12px 0}
  .bot{justify-content:flex-start} .user{justify-content:flex-end}
  .bubble{
    max-width:82%; padding:14px 18px; line-height:1.6; border-radius:var(--radius);
    box-shadow:0 2px 6px rgba(24,50,75,.06)
  }
  .bot .bubble{background:var(--apricot-300); color:#5a372a; border-bottom-left-radius: 4px;}
  .user .bubble{background:var(--lavender-light); color:var(--text); border-bottom-right-radius: 4px;}

  .card{background:#fff; border:1px solid var(--blue-200); border-radius:20px; padding:18px}
  .pill{
    display:inline-flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--blue-200);
    padding:6px 14px; border-radius:999px; font-size:12px; color:#5a6a7a
  }
  .pill img{width:18px;height:18px;border-radius:50%;object-fit:cover}
  .card h3{margin:12px 0 8px; font-size:18px; color:#5a372a}
  .card p{margin:8px 0; color:var(--muted); font-size:14px}
